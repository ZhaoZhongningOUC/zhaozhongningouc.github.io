name: Build and deploy Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate and generate pages
        run: |
          node --check assets/js/content.js
          node --check scripts/build-pages.mjs
          node scripts/build-pages.mjs
          node scripts/build-pages.mjs --check
          git diff --check

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate and verify pages
        run: |
          node --check assets/js/content.js
          node --check scripts/build-pages.mjs
          node scripts/build-pages.mjs
          node scripts/build-pages.mjs --check
          git diff --check
      - name: Keep generated pages in sync
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            index.html \
            about/index.html \
            experience/index.html \
            research/index.html \
            work/index.html \
            en/index.html \
            en/about/index.html \
            en/experience/index.html \
            en/research/index.html \
            en/work/index.html \
            zh/index.html \
            zh/about/index.html \
            zh/experience/index.html \
            zh/research/index.html \
            zh/work/index.html \
            sitemap.xml
          if git diff --cached --quiet; then
            echo "Generated pages are already up to date."
          else
            git commit -m "chore: regenerate website"
            git push
          fi
      - name: Assemble public site
        shell: bash
        run: |
          mkdir -p _site/assets/js
          cp -R assets/css _site/assets/css
          cp -R assets/images _site/assets/images
          cp assets/js/main.js _site/assets/js/main.js
          cp -R about en experience research work zh _site/
          cp index.html robots.txt sitemap.xml .nojekyll _site/
          test -f _site/index.html
          test ! -e _site/assets/js/content.js
          test ! -e _site/scripts/build-pages.mjs
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
